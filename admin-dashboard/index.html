<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helfende Hände Admin</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>
<main>
  <section class="login-view" data-login-view>
    <form class="login-card" id="adminLoginForm">
      <p class="eyebrow">Helfende Hände Intern</p>
      <h1>Admin Login</h1>
      <p class="muted">Dieser Bereich ist nur für die Geschäftsführung.</p>
      <label>E-Mail<input name="email" type="email" required autocomplete="username"></label>
      <label>Passwort<input name="password" type="password" required autocomplete="current-password"></label>
      <button type="submit">Einloggen</button>
      <p class="message" id="loginMessage"></p>
    </form>
  </section>

  <section class="dashboard" data-dashboard hidden>
    <header class="dashboard-header">
      <div>
        <p class="eyebrow">Admin Dashboard</p>
        <h1>Buchungen & Studenten</h1>
      </div>
      <button class="secondary" type="button" id="logoutButton">Logout</button>
    </header>

    <div class="stats" id="stats"></div>

    <div class="layout">
      <section class="panel bookings-panel">
        <h2>Buchungen</h2>
        <div class="list" id="bookings"></div>
      </section>
      <aside class="side">
        <section class="panel">
          <h2>Aktive Zuordnungen</h2>
          <div class="list" id="assignments"></div>
        </section>
        <section class="panel">
          <h2>Studenten</h2>
          <div class="list" id="workers"></div>
        </section>
      </aside>
    </div>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="admin.js"></script>
</body>
</html>
