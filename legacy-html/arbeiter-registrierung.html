<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbeiter Registrierung | Heinzelchen</title>
<link rel="stylesheet" href="assets/styles.css?v=shell-e4dccb-20260624">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Heinzelchen</a>
  <button class="nav-toggle" type="button" aria-label="Menü öffnen" aria-expanded="false">☰</button>
  <ul class="nav-links">
    <li><a href="buchen.html">Heinzelchen buchen</a></li>
    <li><a href="anbieter-werden.html">Heinzelchen werden</a></li>
    <li><a href="kontakt.html">Über uns</a></li>
  </ul>
</nav>
<main>
  <section class="subhero">
    <div class="subhero-inner">
      <h1>Als Helfer registrieren</h1>
      <p>Erstelle deinen Account. Wir prüfen deine Bewerbung und schalten dich danach frei.</p>
    </div>
  </section>
  <section class="portal-section">
    <form class="portal-panel worker-auth-panel" id="workerRegisterForm">
      <h2>Registrierung</h2>
      <div class="booking-field-row">
        <div class="portal-field"><label>Vorname</label><input name="firstName" required autocomplete="given-name"></div>
        <div class="portal-field"><label>Nachname</label><input name="lastName" required autocomplete="family-name"></div>
      </div>
      <div class="portal-field"><label>E-Mail</label><input name="email" type="email" required autocomplete="email"></div>
      <div class="booking-field-row">
        <div class="portal-field"><label>Passwort</label><input name="password" type="password" required minlength="8" autocomplete="new-password"></div>
        <div class="portal-field"><label>Passwort wiederholen</label><input name="passwordRepeat" type="password" required minlength="8" autocomplete="new-password"></div>
      </div>
      <div class="booking-field-row">
        <div class="portal-field"><label>Telefonnummer</label><input name="phone" required autocomplete="tel"></div>
        <div class="portal-field"><label>Stadt</label><input name="city" required autocomplete="address-level2"></div>
      </div>
      <div class="portal-field">
        <label>Ausweis hochladen</label>
        <input name="idCard" type="file" accept=".jpg,.jpeg,.png,.pdf,image/jpeg,image/png,application/pdf" required>
        <small>JPG, PNG oder PDF · maximal 10MB</small>
      </div>
      <button class="btn-primary form-submit" type="submit">Registrieren</button>
      <p class="portal-message" id="workerRegisterMessage"></p>
    </form>
  </section>
</main>
<script src="assets/worker-auth.js"></script>
<script src="assets/main.js"></script>
</body>
</html>
