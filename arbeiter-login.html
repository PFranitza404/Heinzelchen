<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbeiter Login | Helfende Hände</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Heinzelchen</a>
  <button class="nav-toggle" type="button" aria-label="Menü öffnen">☰</button>
  <ul class="nav-links">
    <li><a class="" href="buchen.html">Heinzelchen buchen</a></li>
    <li><a class="" href="anbieter-werden.html">Heinzelchen werden</a></li>
    <li><a class="" href="kontakt.html">Über uns</a></li>
  </ul>
</nav>
<main>
  <section class="subhero">
    <div class="subhero-inner">
      <h1>Arbeiter Login</h1>
      <p>Melde dich an, um deine Aufträge und Verfügbarkeiten zu verwalten.</p>
    </div>
  </section>
  <section class="portal-section">
    <form class="portal-panel worker-auth-panel" id="workerLoginForm">
      <h2>Einloggen</h2>
      <div class="portal-field"><label>E-Mail</label><input name="email" type="email" required autocomplete="email"></div>
      <div class="portal-field"><label>Passwort</label><input name="password" type="password" required autocomplete="current-password"></div>
      <button class="btn-primary form-submit" type="submit">Einloggen</button>
      <p class="portal-message" id="workerLoginMessage"></p>
      <p class="worker-auth-note">Noch keinen Account? <a href="arbeiter-registrierung">Registrieren</a></p>
    </form>
  </section>
</main>
<script src="assets/worker-auth.js"></script>
</body>
</html>
